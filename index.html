<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>apps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            color: #333;
        }

        h1 {
            margin-bottom: 10px;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .project-list {
            margin-top: 30px;
        }

        .project {
            background: white;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">


        <div class="project-list">
            <div class="project">
                <h2>Ski Radius Geometry Calculator</h2>
                <a href="https://oefi.github.io/ski-radius-calculator/">ski-radius-calculator</a>
            </div>


            <div class="project">
                <h2>The Clockwork Menace of Oakhaven (a complete, self-contained DND 5E adventure featuring a combat tracker)</h2>
                <a href="https://oefi.github.io/DND5E-Adventure-The-Clockwork-Menace-of-Oakhaven/">The Clockwork Menace of Oakhaven</a>
            </div>

            <div class="project">
                <h2>D&D 5e DPR Calculator (2024 Edition)</h2>
                <a href="https://oefi.github.io/DND-5E-Damage-Per-Round-Calculator/">DND-5E-Damage-Per-Round-Calculator</a>
            </div>
        </div>
    </div>
</body>

</html>
